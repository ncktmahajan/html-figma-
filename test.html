<!DOCTYPE html>
<html>
<head>
<style>
  .gradient-box {
    width: 300px;
    height: 200px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 24px;
    font-weight: bold;
  }
  
  .simple-gradient {
    width: 300px;
    height: 100px;
    background: linear-gradient(to right, #ff0000, #0000ff);
    margin-top: 20px;
  }
</style>
</head>
<body>
  <div class="gradient-box">
    Centered Text
  </div>
  
  <div class="simple-gradient"></div>
</body>
</html>
